<div class="login-wrapper">
  <!-- Panel izquierdo decorativo -->
  <div class="login-panel-left">
    <div class="decorativo-circulo c1"></div>
    <div class="decorativo-circulo c2"></div>
    <div class="decorativo-circulo c3"></div>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="20" fill="rgba(255,255,255,0.15)"/>
          <path d="M20 10C14.48 10 10 14.48 10 20C10 25.52 14.48 30 20 30C25.52 30 30 25.52 30 20C30 14.48 25.52 10 20 10ZM20 14C21.66 14 23 15.34 23 17C23 18.66 21.66 20 20 20C18.34 20 17 18.66 17 17C17 15.34 18.34 14 20 14ZM20 27.2C17.5 27.2 15.29 25.92 14 23.98C14.03 21.99 18 20.9 20 20.9C21.99 20.9 25.97 21.99 26 23.98C24.71 25.92 22.5 27.2 20 27.2Z" fill="white"/>
        </svg>
      </div>
      <h1>Gestión Perfil-UDV</h1>
      <p>La plataforma de gestión personal, donde aplicamos nuestros conocimientos vistos en la unidad</p>
    </div>
    <div class="features">
      <div class="feature-item">
        <span class="feature-icon">✦</span>
        <span>Gestión de perfil segura</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">✦</span>
        <span>Acceso protegido con JWT</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">✦</span>
        <span>Datos siempre actualizados</span>
      </div>
    </div>
  </div>

  <!-- Panel derecho: formulario -->
  <div class="login-panel-right">
    <div class="login-card">
      <div class="login-header">
        <h2>Bienvenido</h2>
        <p>Inicia sesión para continuar</p>
      </div>

      <form (ngSubmit)="onLogin()" #loginForm="ngForm" novalidate>
        <div class="form-group" [class.has-error]="mensajeError && !usuario.trim()">
          <label for="usuario">Usuario o Correo</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              id="usuario"
              type="text"
              [(ngModel)]="usuario"
              name="usuario"
              placeholder="Ingresa tu usuario o correo"
              autocomplete="username"
            />
          </div>
        </div>

        <div class="form-group" [class.has-error]="mensajeError && !contrasena.trim()">
          <label for="contrasena">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              id="contrasena"
              [type]="mostrarContrasena ? 'text' : 'password'"
              [(ngModel)]="contrasena"
              name="contrasena"
              placeholder="Ingresa tu contraseña"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" (click)="toggleMostrarContrasena()">
              <svg *ngIf="!mostrarContrasena" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="mostrarContrasena" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="error-mensaje" *ngIf="mensajeError">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ mensajeError }}
        </div>

        <button type="submit" class="btn-login" [disabled]="cargando">
          <span *ngIf="!cargando">Iniciar Sesión</span>
          <span *ngIf="cargando" class="spinner-container">
            <span class="spinner"></span>
            Verificando...
          </span>
        </button>
      </form>

      <div class="login-footer">
        <p>Ingresa tu <strong>usuario</strong> previamente <strong>Dado</strong></p>
      </div>
    </div>
  </div>
</div>
